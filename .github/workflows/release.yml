name: Android Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bump app version
        id: version
        run: |
          node <<'EOF'
          const fs = require('fs');

          const packageJsonPath = 'package.json';
          const packageLockPath = 'package-lock.json';
          const gradlePath = 'android/app/build.gradle';

          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const [major, minor] = packageJson.version.split('.').map(Number);
          const nextVersion = `${major}.${minor + 1}.0`;

          packageJson.version = nextVersion;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const packageLock = JSON.parse(fs.readFileSync(packageLockPath, 'utf8'));
          packageLock.version = nextVersion;
          if (packageLock.packages && packageLock.packages['']) {
            packageLock.packages[''].version = nextVersion;
          }
          fs.writeFileSync(packageLockPath, `${JSON.stringify(packageLock, null, 2)}\n`);

          let gradle = fs.readFileSync(gradlePath, 'utf8');
          const versionCodeMatch = gradle.match(/versionCode\s+(\d+)/);
          const currentVersionCode = Number(versionCodeMatch[1]);
          const nextVersionCode = currentVersionCode + 1;

          gradle = gradle.replace(/versionCode\s+\d+/, `versionCode ${nextVersionCode}`);
          gradle = gradle.replace(/versionName\s+"[^"]+"/, `versionName "${nextVersion}"`);
          fs.writeFileSync(gradlePath, gradle);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${nextVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_code=${nextVersionCode}\n`);
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Commit version bump
        run: |
          git add package.json package-lock.json android/app/build.gradle
          GIT_AUTHOR_NAME='github-actions[bot]' \
          GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
          GIT_COMMITTER_NAME='github-actions[bot]' \
          GIT_COMMITTER_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/app-release.apk
